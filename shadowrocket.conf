#!name = AppTesters
#!desc = Converted from https://apptesters.org/egern.yaml for Shadowrocket.
#!homepage = https://apptesters.org/egern.yaml

[Header Rewrite]
http-request ^https?://api.revenuecat.com/.+/(receipts$|subscribers/?(.*?)*$) header-del X-RevenueCat-ETag
http-request ^https?://api.revenuecat.com/.+/(receipts$|subscribers/?(.*?)*$) header-del x-revenuecat-etag

[Script]
AppRCTesters = type=http-response,pattern=^https:\/\/api\.revenuecat\.com\/.+\/(receipts$|subscribers\/[^/]+$),requires-body=true,max-size=-1,timeout=60,script-update-interval=5,script-path=https://apptesters.org/egern/AutoRC.js,enable=true
AppAdTesters = type=http-response,pattern=https://api.adapty.io/api/v1/sdk/analytics/profiles,requires-body=true,max-size=-1,timeout=60,script-update-interval=5,script-path=https://apptesters.org/egern/Adapty.js,enable=true
AppFMTesters = type=http-response,pattern=https://order.creativeappnow.com/iap/receipt,requires-body=true,max-size=-1,timeout=60,script-update-interval=5,script-path=https://apptesters.org/egern/Facemoji.js,enable=true
AppReTesters = type=http-response,pattern=https:\/\/license\.pdfexpert\.com\/api\/2\.0\/(calendarslite|pdfexpert6|documents)\/subscription\/(refresh|check),requires-body=true,max-size=-1,timeout=60,script-update-interval=5,script-path=https://apptesters.org/egern/readdle.js,enable=true
AppitTesters = type=http-response,pattern=^https:\/\/buy\.itunes\.apple\.com\/verifyReceipt,requires-body=true,max-size=-1,timeout=60,script-update-interval=5,script-path=https://apptesters.org/egern/iTunes.js,enable=true
AppMuTesters = type=http-response,pattern=us-central1-muslim-pro-app.cloudfunctions.net/GetUserPremiumInfo,requires-body=true,max-size=-1,timeout=60,script-update-interval=5,script-path=https://apptesters.org/egern/MuslimPro.js,enable=true
AppGrTesters = type=http-response,pattern=^https?:\/\/subscription\.grammarly\.com\/api\/v1\/subscription$,requires-body=true,max-size=-1,timeout=60,script-update-interval=5,script-path=https://apptesters.org/egern/Grammarly.js,enable=true
AppeSTesters = type=http-response,pattern=api.esound.app/account,requires-body=true,max-size=-1,timeout=60,script-update-interval=5,script-path=https://apptesters.org/egern/eSound.js,enable=true
AppPurTesters = type=http-response,pattern=https://api.purchasely.io/paab/user_purchases,requires-body=true,max-size=-1,timeout=60,script-update-interval=5,script-path=https://apptesters.org/egern/purchasely.js,enable=true
AppVaTesters = type=http-response,pattern=prod.studysmarter.de/payments/info,requires-body=true,max-size=-1,timeout=60,script-update-interval=5,script-path=https://apptesters.org/egern/Vaia.js,enable=true
AppQOTesters = type=http-response,pattern=api.qonversion.io/v1/user/init,requires-body=true,max-size=-1,timeout=60,script-update-interval=5,script-path=https://apptesters.org/egern/qonversion.js,enable=true
AppDJTesters = type=http-response,pattern=https://api.mwm-users.com/me/features,requires-body=true,max-size=-1,timeout=60,script-update-interval=5,script-path=https://apptesters.org/egern/edjingMix.js,enable=true
AppVCTesters = type=http-response,pattern=https://api-fra.vivacut.com/api/rest/commerce/integrate/vip/perform,requires-body=true,max-size=-1,timeout=60,script-update-interval=5,script-path=https://apptesters.org/egern/VivaCut.js,enable=true
AppCaTesters = type=http-response,pattern=https://carrotweather.herokuapp.com/parse/functions/findSubscriptionsForUserId,requires-body=true,max-size=-1,timeout=60,script-update-interval=5,script-path=https://apptesters.org/egern/Carrot.js,enable=true
AppKineTesters = type=http-response,pattern=https://api-account.kinemasters.com/v2/user/subscribe,requires-body=true,max-size=-1,timeout=60,script-update-interval=5,script-path=https://apptesters.org/egern/KineMaster.js,enable=true
AppPicTesters = type=http-request,pattern=https://api.picsart.com/gw-v2/shop/subscription/apple/purchases,requires-body=true,max-size=-1,timeout=60,script-update-interval=5,script-path=https://apptesters.org/egern/PicsArt.js,enable=true
AppAMTesters = type=http-response,pattern=https://us-central1-alight-creative.cloudfunctions.net/getAccountStatusAndLicenses,requires-body=true,max-size=-1,timeout=60,script-update-interval=5,script-path=https://apptesters.org/egern/AlightMotion.js,enable=true
AppSaTesters = type=http-response,pattern=api.sandbox.love/accounts/current,requires-body=true,max-size=-1,timeout=60,script-update-interval=5,script-path=https://apptesters.org/egern/SandBox.js,enable=true
AppSSesters = type=http-response,pattern=subscriptions.songshift.com/validate,requires-body=true,max-size=-1,timeout=60,script-update-interval=5,script-path=https://apptesters.org/egern/SongShift.js,enable=true
AppADBTesters = type=http-response,pattern=api.adblockpro.app/verify,requires-body=true,max-size=-1,timeout=60,script-update-interval=5,script-path=https://apptesters.org/egern/AdblockPro.js,enable=true
AppADGTesters = type=http-response,pattern=^https:\/\/mobile-api\.adguard\.org\/api\/.+\/ios_validate_receipt\/(.*?),requires-body=true,max-size=-1,timeout=60,script-update-interval=5,script-path=https://apptesters.org/egern/AdGuardPro.js,enable=true
AppDTesters = type=http-response,pattern=ILoveDevTheDev.com,requires-body=true,max-size=-1,timeout=60,script-update-interval=5,script-path=https://URL2Script.com,enable=true
AppDTesters_2 = type=http-response,pattern=ILoveDevTheDev.com,requires-body=true,max-size=-1,timeout=60,script-update-interval=5,script-path=https://URL2Script.com,enable=true
AppDTesters_3 = type=http-response,pattern=ILoveDevTheDev.com,requires-body=true,max-size=-1,timeout=60,script-update-interval=5,script-path=https://URL2Script.com,enable=true

[MITM]
hostname = %APPEND% api.revenuecat.com, buy.itunes.apple.com, api.picsart.com, api-account.kinemasters.com, us-central1-alight-creative.cloudfunctions.net, api.adapty.io, carrotweather.herokuapp.com, order.creativeappnow.com, api.mwm-users.com, us-central1-muslim-pro-app.cloudfunctions.net, prod.studysmarter.de, api.qonversion.io, subscription.grammarly.com, api.esound.app, api.purchasely.io, api.sandbox.love, subscriptions.songshift.com, api.adblockpro.app, mobile-api.adguard.org, license.pdfexpert.com, api-fra.vivacut.com, ILoveDevTheDev.com
