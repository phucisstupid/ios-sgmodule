name: Convert Egern Config

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: "Egern YAML URL to convert"
        required: false
        default: "https://apptesters.org/egern.yaml"
        type: string
      module_name:
        description: "Display name for generated configs"
        required: false
        default: "AppTesters"
        type: string
  push:
    paths:
      - ".github/workflows/convert-egern.yml"
      - "tools/convert-egern.js"
      - "README.md"

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6

      - name: Convert Egern config
        run: |
          SOURCE_URL="${{ inputs.source_url || 'https://apptesters.org/egern.yaml' }}"

          node tools/convert-egern.js \
            --url "$SOURCE_URL" \
            --name "${{ inputs.module_name || 'AppTesters' }}" \
            --shadowrocket-out shadowrocket.conf \
            --surge-out module.sgmodule

      - name: Verify generated configs
        run: |
          test -s shadowrocket.conf
          test -s module.sgmodule
          grep -q '^\[Script\]$' shadowrocket.conf
          grep -q '^\[MITM\]$' shadowrocket.conf
          grep -q '^\[Script\]$' module.sgmodule
          grep -q '^\[MITM\]$' module.sgmodule
          test "$(grep -c ' = type=http-' shadowrocket.conf)" -gt 0
          test "$(grep -c ' = type=http-' module.sgmodule)" -gt 0

      - name: Commit generated configs
        run: |
          if git diff --quiet -- shadowrocket.conf module.sgmodule; then
            echo "No generated config changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add shadowrocket.conf module.sgmodule
          git commit -m "Update generated configs"
          git push

      - name: Upload generated configs
        uses: actions/upload-artifact@v7
        with:
          name: converted-egern-configs
          path: |
            shadowrocket.conf
            module.sgmodule
